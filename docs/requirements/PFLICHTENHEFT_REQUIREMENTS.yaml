# Bookando.de — Canonical Requirements Registry
# Single source of truth. Generated manually once, auto-verified thereafter.
# Every PF-ID maps to one atomic customer requirement.
#
# Fields:
#   id:          PF-XX-YYY (canonical ID)
#   source_refs: list of customer document locations (chapter.section)
#   requirement: short title matching the customer specification
#   chapter:     original Pflichtenheft chapter
#   phase:       MVP | Phase 2 | Phase 3 | alle
#   mvp_system:  one exlusive MVP system (empty if non-MVP)
#   status:      VERIFIED_COMPLETE | IMPLEMENTED_UNVERIFIED | PARTIAL |
#                MOCK_ONLY | DOCUMENTED_ONLY | MISSING | CONTRADICTED |
#                BLOCKED | FUTURE_PHASE
#   weight:      decimal weight per status scale
#   note:        optional remark
#
# Semantic duplicates are merged under one canonical ID with multiple source_refs.
# Cross-referencing IDs that reference the same function carry the same canonical
# requirement ID and are not double-counted in the MVP denominator.

