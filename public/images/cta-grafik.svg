<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2230"/>
      <stop offset="100%" stop-color="#0f1923"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <filter id="keyGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="25" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Goldener Light-Orb (Hintergrund) -->
  <circle cx="800" cy="460" r="320" fill="url(#glow)"/>

  <!-- Smartphone (links) -->
  <g transform="translate(120, 220)" filter="url(#shadow)">
    <rect x="0" y="0" width="260" height="520" rx="30" fill="#131a22" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="8" y="8" width="244" height="460" rx="20" fill="url(#screen)"/>
    <!-- Willkommen! Screen -->
    <rect x="20" y="40" width="212" height="56" rx="12" fill="#F59E0B" opacity="0.1"/>
    <text x="126" y="68" font-size="16" font-weight="700" fill="#F59E0B" text-anchor="middle" font-family="system-ui">Willkommen!</text>
    <text x="126" y="84" font-size="10" fill="#64748b" text-anchor="middle" font-family="system-ui">Dein Konto ist aktiv</text>
    <!-- Großes grünes Häkchen -->
    <circle cx="126" cy="140" r="30" fill="#34d399" opacity="0.12"/>
    <path d="M108,138 L122,152 L144,128" fill="none" stroke="#34d399" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="126" y="200" font-size="11" fill="#94a3b8" text-anchor="middle" font-family="system-ui">30 Tage kostenlos testen</text>
    <text x="126" y="218" font-size="9" fill="#64748b" text-anchor="middle" font-family="system-ui">Keine Zahlungsmethode nötig</text>
  </g>

  <!-- Großer goldener Schlüssel (zentriert) -->
  <g transform="translate(800, 420)" filter="url(#keyGlow)">
    <!-- Schlüssel-Ring (oben) -->
    <circle cx="0" cy="-100" r="60" fill="none" stroke="url(#gold)" stroke-width="8"/>
    <!-- "30" im Ring -->
    <text x="-2" y="-88" font-size="42" font-weight="800" fill="#F59E0B" text-anchor="middle" font-family="system-ui">30</text>
    <text x="-2" y="-66" font-size="12" font-weight="600" fill="#34d399" text-anchor="middle" font-family="system-ui">✓ TAGE</text>
    <!-- Schlüssel-Schaft -->
    <rect x="-8" y="-40" width="16" height="120" rx="4" fill="url(#gold)"/>
    <!-- Schlüssel-Bart -->
    <path d="M-8,60 L-8,90 L-24,90 L-24,75 L-16,75" fill="none" stroke="url(#gold)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M8,60 L8,85 L20,85 L20,70 L14,70" fill="none" stroke="url(#gold)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Euro-Symbol-Detail -->
    <text x="-2" y="100" font-size="14" fill="#F59E0B" opacity="0.6" text-anchor="middle" font-family="system-ui">€</text>
  </g>

  <!-- Tablet (rechts) -->
  <g transform="translate(1020, 180)" filter="url(#shadow)">
    <rect x="0" y="0" width="380" height="560" rx="20" fill="#131a22" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="8" y="8" width="364" height="500" rx="12" fill="url(#screen)"/>
    <!-- Dashboard Countdown -->
    <rect x="16" y="24" width="348" height="80" rx="10" fill="#F59E0B" opacity="0.08" stroke="#F59E0B" stroke-width="0.5" stroke-opacity="0.15"/>
    <text x="190" y="52" font-size="11" font-weight="600" fill="#F59E0B" text-anchor="middle" font-family="system-ui">30 TAGE VERBLEIBEND</text>
    <!-- Countdown-Ring -->
    <circle cx="190" cy="120" r="50" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="6"/>
    <circle cx="190" cy="120" r="50" fill="none" stroke="#F59E0B" stroke-width="6" stroke-dasharray="314" stroke-dashoffset="10" stroke-linecap="round" transform="rotate(-90, 190, 120)"/>
    <text x="190" y="118" font-size="24" font-weight="700" fill="#e2e8f0" text-anchor="middle" font-family="system-ui">30</text>
    <text x="190" y="136" font-size="9" fill="#64748b" text-anchor="middle" font-family="system-ui">Tage</text>
    <!-- Fortschrittsbalken -->
    <rect x="40" y="190" width="300" height="6" rx="3" fill="rgba(255,255,255,0.04)"/>
    <rect x="40" y="190" width="300" height="6" rx="3" fill="#F59E0B" opacity="0.6"/>
    <!-- Feature-List -->
    <g transform="translate(40, 220)">
      <text x="0" y="12" font-size="11" font-weight="600" fill="#e2e8f0" font-family="system-ui">Alle Funktionen freigeschaltet:</text>
      <g font-size="10" fill="#94a3b8" font-family="system-ui">
        <text x="0" y="36">✓ Unbegrenzte Buchungen</text>
        <text x="0" y="56">✓ Mitarbeiter-Verwaltung</text>
        <text x="0" y="76">✓ Marketplace-Integration</text>
        <text x="0" y="96">✓ Affiliate-Programm</text>
        <text x="0" y="116">✓ 24/7 Support</text>
      </g>
    </g>
  </g>
</svg>