name: Frontend CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: CI=true npm test -- --watchAll=false
      - run: npm run build
